<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聽音辨圖測驗</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #f4f4f9; 
            padding: 20px; 
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }
        .options-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            margin-top: 20px; 
        }
        .option-card { 
            border: 3px solid #eee; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: 0.2s; 
            padding: 10px; 
            background-color: white;
        }
        .option-card:hover { 
            border-color: #008CBA; 
            background-color: #f0f8fa; 
        }
        .option-card img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 4px; 
            pointer-events: none; 
            object-fit: contain;
            max-height: 250px;
        }
        .feedback { 
            font-size: 1.5em; 
            margin: 20px 0; 
            font-weight: bold; 
            min-height: 40px; 
        }
        .correct { color: #4CAF50; }
        .incorrect { color: #F44336; }
        .btn { 
            font-size: 1.2em; 
            padding: 10px 20px; 
            cursor: pointer; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            margin: 10px;
        }
        #next-btn { background-color: #008CBA; display: none; margin: 0 auto;}
        #next-btn:hover { background-color: #007B9E; }
        #play-btn { background-color: #ff9800; }
        #play-btn:hover { background-color: #e68a00; }
        #play-btn:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container" id="quiz-container">
    <h2>聽音辨圖測驗</h2>
    <p>請點擊「播放音檔」按鈕聆聽，並選出相對應的圖片。（點擊後會連續播放 2 次）</p>
    
    <div>
        <button id="play-btn" class="btn" onclick="playAudioTwice()">▶️ 播放音檔</button>
    </div>

    <div id="feedback" class="feedback"></div>

    <div class="options-grid" id="options-container">
        </div>

    <div style="margin-top: 30px;">
        <button id="next-btn" class="btn" onclick="nextQuestion()">下一題</button>
    </div>
</div>

<audio id="audio-player"></audio>

<audio id="audio-correct" src="正確.mp3"></audio>
<audio id="audio-incorrect" src="錯誤.mp3"></audio>
<audio id="audio-all" src="ALL.mp3"></audio>

<script>
    const quizData = [
        { id: 1, audio: 's5_1.mp3', image: 'p5_1.jpg', name: '頭殼 (頭)' },
        { id: 2, audio: 's5_2.mp3', image: 'p5_2.jpg', name: '頷頸 (脖子)' },
        { id: 3, audio: 's5_3.mp3', image: 'p5_3.jpg', name: '手' },
        { id: 4, audio: 's5_4.mp3', image: 'p5_4.jpg', name: '腰' },
        { id: 5, audio: 's5_5.mp3', image: 'p5_5.jpg', name: '腹肚 (肚子)' },
        { id: 6, audio: 's5_6.mp3', image: 'p5_6.jpg', name: '肚臍' },
        { id: 7, audio: 's5_7.mp3', image: 'p5_7.jpg', name: '跤 (腳)' },
        { id: 8, audio: 's5_8.mp3', image: 'p5_8.jpg', name: '指甲' },
        { id: 9, audio: 's5_9.mp3', image: 'p5_9.jpg', name: '手指頭仔 (手指)' },
        { id: 10, audio: 's5_10.mp3', image: 'p5_10.jpg', name: '尻川髁 (屁股)' }
    ];

    let remainingItems = [...quizData]; 
    let currentItem = null;
    let playCount = 0;
    let isPlaying = false;
    let hasAnswered = false;

    // 取得所有 Audio 元素
    const audioPlayer = document.getElementById('audio-player');
    const audioCorrect = document.getElementById('audio-correct');
    const audioIncorrect = document.getElementById('audio-incorrect');
    const audioAll = document.getElementById('audio-all');

    const optionsContainer = document.getElementById('options-container');
    const feedbackEl = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const playBtn = document.getElementById('play-btn');

    // 陣列洗牌函數
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // 載入新題目
    function loadQuestion() {
        hasAnswered = false;
        isPlaying = false;
        playBtn.disabled = false; 
        feedbackEl.textContent = '';
        feedbackEl.className = 'feedback';
        nextBtn.style.display = 'none';
        optionsContainer.innerHTML = '';
        
        // 判斷是否全數過關
        if (remainingItems.length === 0) {
            document.getElementById('quiz-container').innerHTML = '<h2>🎉 恭喜！所有音檔與圖檔皆已配對成功！</h2>';
            // 播放全數通過的音效
            audioAll.currentTime = 0; 
            audioAll.play();
            return;
        }

        const randomIndex = Math.floor(Math.random() * remainingItems.length);
        currentItem = remainingItems[randomIndex];

        // 產生 4 個選項
        let options = [currentItem];
        let wrongOptions = quizData.filter(item => item.id !== currentItem.id);
        shuffleArray(wrongOptions);
        options.push(...wrongOptions.slice(0, 3)); 
        
        shuffleArray(options);

        // 生成選項按鈕
        options.forEach(item => {
            const div = document.createElement('div');
            div.className = 'option-card';
            div.innerHTML = `<img src="${item.image}" alt="選項圖片" onerror="this.src='https://via.placeholder.com/300x200?text=圖片載入失敗';">`;
            div.onclick = () => checkAnswer(item);
            optionsContainer.appendChild(div);
        });

        audioPlayer.src = currentItem.audio;
    }

    // 播放題目音檔 2 次
    function playAudioTwice() {
        if (isPlaying || !currentItem) return;
        isPlaying = true;
        playCount = 0;
        playBtn.disabled = true; 

        let playPromise = audioPlayer.play();
        if (playPromise !== undefined) {
            playPromise.catch(error => {
                console.log("播放發生錯誤：", error);
                isPlaying = false;
                playBtn.disabled = false;
            });
        }

        audioPlayer.onended = () => {
            playCount++;
            if (playCount < 2) {
                setTimeout(() => {
                    audioPlayer.play();
                }, 1000); 
            } else {
                isPlaying = false;
                playBtn.disabled = false; 
            }
        };
    }

    // 驗證選擇
    function checkAnswer(selectedItem) {
        if (hasAnswered) return; 
        hasAnswered = true;
        
        // 停止播放中的題目語音
        audioPlayer.pause(); 
        isPlaying = false;
        playBtn.disabled = false;

        if (selectedItem.id === currentItem.id) {
            // 答對邏輯
            feedbackEl.textContent = '正確';
            feedbackEl.className = 'feedback correct';
            
            // 播放答對音效
            audioCorrect.currentTime = 0; // 確保每次都從頭播放
            audioCorrect.play();
            
            remainingItems = remainingItems.filter(item => item.id !== currentItem.id);
        } else {
            // 答錯邏輯
            feedbackEl.textContent = `錯誤 不計分 (正確答案是：${currentItem.name})`;
            feedbackEl.className = 'feedback incorrect';
            
            // 播放答錯音效
            audioIncorrect.currentTime = 0; 
            audioIncorrect.play();
        }

        nextBtn.style.display = 'block';
    }

    // 前往下一題
    function nextQuestion() {
        loadQuestion();
    }

    // 網頁載入後啟動
    window.onload = () => {
        loadQuestion();
    };
</script>
</body>
</html>
